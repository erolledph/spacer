<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keyboard Ranger</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        :root {
            --neon-blue: #00ffff;
            --neon-pink: #ff0055;
            --neon-green: #00ff00;
            --dark-bg: #050510;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #main-container {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            height: 100%;
        }

        @media (min-width: 768px) {
            #main-container {
                grid-template-columns: 1fr 3fr 1fr;
            }
        }

        .ad-section {
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(20,20,40,0.9), rgba(10,10,20,0.95));
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            .ad-section {
                display: flex;
                writing-mode: vertical-lr;
            }
        }

        #game-section {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-left: 1px solid rgba(0,255,255,0.1);
            border-right: 1px solid rgba(0,255,255,0.1);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            cursor: default;
        }

        #game-section * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #app-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            top: 15px;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: auto;
        }

        #score-display { left: 15px; color: var(--neon-blue); }
        #multiplier-display { left: 15px; top: 40px; color: #ff00ff; }

        #top-right-icons {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: auto;
        }

        .top-icon-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid white;
            border-radius: 50%;
            width: clamp(32px, 7vw, 42px);
            height: clamp(32px, 7vw, 42px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .top-icon-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .top-icon-btn:active { transform: scale(0.9); }

        .top-icon-btn svg {
            width: 60%;
            height: 60%;
            fill: white;
        }

        #red-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 50;
        }

        #red-overlay.active {
            opacity: 1;
            animation: redFlash 0.3s ease-out;
        }

        #red-overlay::before,
        #red-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            width: 15%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,0,0,0.6), transparent);
        }

        #red-overlay::before { left: 0; }

        #red-overlay::after {
            right: 0;
            background: linear-gradient(to left, rgba(255,0,0,0.6), transparent);
        }

        @keyframes redFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #health-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            max-width: 200px;
            height: clamp(10px, 3vh, 15px);
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background-color: var(--neon-green);
            transition: width 0.2s, background-color 0.2s;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10000;
        }

        .main-menu {
            background: linear-gradient(145deg, rgba(15,15,35,0.98), rgba(5,5,18,0.98));
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 0 60px rgba(0,255,255,0.12), inset 0 0 40px rgba(0,255,255,0.02);
            width: calc(100% - 40px);
            max-width: 400px;
            text-align: center;
            animation: modalSlideIn 0.4s ease-out;
            margin: 20px auto;
            box-sizing: border-box;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.92) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #game-over h1 {
            font-family: 'Courier New', Courier, monospace;
            color: var(--neon-blue);
            margin: 0 0 8px 0;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-shadow: 0 0 25px var(--neon-blue), 0 0 50px rgba(0,255,255,0.3);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #game-over .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 25px 0;
        }

        .menu-btn {
            padding: 18px 35px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-play {
            background: linear-gradient(135deg, var(--neon-blue), #00cccc);
            color: #000;
            box-shadow: 0 4px 25px rgba(0,255,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .btn-play:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 35px rgba(0,255,255,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .btn-play:active {
            transform: translateY(-1px) scale(0.99);
        }

        .btn-settings {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-settings:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 4px 25px rgba(255,0,85,0.35);
        }

        #game-over #instructions {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            margin-top: 25px;
            line-height: 1.7;
            letter-spacing: 0.5px;
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-box {
            background: rgba(0,255,255,0.08);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 18px;
        }

        .stat-label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
        }

        .stat-value {
            display: block;
            color: var(--neon-blue);
            font-size: 38px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0,255,255,0.2);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            width: 100%;
        }

        .bento-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            width: 100%;
            box-sizing: border-box;
        }

        .bento-item {
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
        }

        .stat-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,255,255,0.15);
            border-radius: 14px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            min-width: 120px;
            flex: 1;
            box-sizing: border-box;
        }

        .form-box {
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .form-box input {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 10px;
            color: var(--neon-blue);
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-box input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .form-box input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
            color: #fff;
        }

        .form-box .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-pink), #cc0044);
            color: #fff;
            font-size: 13px;
            padding: 12px 20px;
            letter-spacing: 2px;
            border: none;
        }

        .form-box .action-btn:hover {
            box-shadow: 0 0 25px rgba(255,0,85,0.5);
            transform: translateY(-2px);
        }

        .form-box .action-btn:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: linear-gradient(145deg, rgba(25,15,35,0.98), rgba(10,5,20,0.98));
            border: 2px solid var(--neon-pink);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            width: calc(100% - 40px);
            max-width: 340px;
            box-shadow: 0 0 40px rgba(255,0,85,0.2), inset 0 0 20px rgba(255,0,85,0.05);
            animation: modalSlideIn 0.3s ease-out;
            margin: 20px auto;
            box-sizing: border-box;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-content h2 { 
            color: var(--neon-pink); 
            margin: 0 0 20px 0; 
            font-size: 22px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-pink);
            letter-spacing: 3px;
            text-align: center;
            display: block;
            width: 100%;
            font-family: 'Courier New', Courier, monospace;
        }

        .settings-section {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .setting-item:last-child { border-bottom: none; }
        .setting-item label { 
            color: #fff; 
            font-size: 14px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .setting-item input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            outline: none;
        }

        .setting-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--neon-pink);
            border-radius: 50%;
            cursor: pointer;
        }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .range-row span {
            min-width: 45px;
            text-align: center;
            color: var(--neon-pink);
            font-size: 13px;
            font-family: 'Courier New', Courier, monospace;
        }

        .action-btn {
            background-color: var(--neon-blue);
            color: #000;
            border: none;
            padding: 14px 20px;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 8px;
            transition: transform 0.1s, box-shadow 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover { box-shadow: 0 0 20px rgba(0,255,255,0.5); }
        .action-btn:active { transform: scale(0.97); }

        #gameplay-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        #gameplay-buttons .action-btn {
            margin-top: 0;
        }

        #virtual-keyboard {
            display: none;
            flex-shrink: 0;
            flex-direction: column;
            gap: 6px;
            padding: 12px 8px 20px 8px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            border-top: 2px solid var(--neon-pink);
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
            z-index: 150;
            min-height: 90px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            box-sizing: border-box;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 -4px 20px rgba(255,0,85,0.15);
        }

        @keyframes kbSlideUp {
            from { transform: translateX(-50%) translateY(100%); }
            to { transform: translateX(-50%) translateY(0); }
        }

        #virtual-keyboard.show {
            animation: kbSlideUp 0.25s ease-out;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .kb-key {
            background: linear-gradient(145deg, #2a2a3d, #1a1a28);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(16px, 5vw, 22px);
            font-weight: bold;
            flex: 1;
            max-width: 50px;
            height: clamp(45px, 8vh, 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
            touch-action: manipulation;
            transition: background-color 0.1s, transform 0.1s;
        }

        .kb-row:nth-child(3) .kb-key { max-width: 45px; } 

        .kb-key.active {
            background-color: var(--neon-blue);
            color: #000;
            border-color: #fff;
            transform: translateY(2px);
        }

        .kb-key.error {
            background-color: var(--neon-pink);
            color: #fff;
            border-color: #fff;
            transform: translateY(2px);
        }

        @media (max-width: 800px), (pointer: coarse) {
            #virtual-keyboard { display: flex; }
            .hud { top: 60px; }
            #top-right-icons { top: 12px; right: 12px; gap: 8px; }
            #health-container { top: 12px; }
            #multiplier-display { top: 85px; }
        }
    </style>
</head>
<body>

    <!-- Semantic Grid Container -->
    <main id="main-container">
        
        <!-- Section 1: Left Ad (hidden on mobile) -->
        <section class="ad-section">
            <span>Advertisement</span>
        </section>

        <!-- Section 2: Game Container -->
        <section id="game-section">
            <div id="app-wrapper">
                <div id="game-container">
                    <canvas id="gameCanvas"></canvas>
<audio id="bg-music" loop>
                <source src="The_Heavy_Orbit.mp3" type="audio/mpeg">
            </audio>
            <img id="spaceship-sprite" src="spaceship-gif.gif" style="display:none;position:absolute;pointer-events:none;z-index:60;width:50px;height:50px;">
            <audio id="pew-sound">
                        <source src="pew.mp3" type="audio/mpeg">
                    </audio>
                    <div id="ui-layer">
                        <div id="health-container">
                            <div id="health-bar"></div>
                        </div>
                        <div id="top-right-icons">
                            <button class="top-icon-btn" id="sound-btn" title="Sound">
                                <svg id="sound-on-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg id="sound-off-icon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                            </button>
                            <button class="top-icon-btn" id="settings-btn" title="Settings">
                                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            </button>
                        </div>
                        <div class="hud" id="score-display">Score: <span id="score">0</span></div>
                        <div class="hud" id="multiplier-display">Streak: <span id="streak">0</span></div>
                    </div>

                    <div id="red-overlay"></div>

                    <div id="settings-modal" class="modal">
                        <div class="modal-content">
                            <h2 id="settings-title">PAUSED</h2>
                            <div class="settings-section">
                                <div class="setting-item">
                                    <label><input type="checkbox" id="modal-bgmusic-toggle" checked> Background Music</label>
                                    <div class="range-row">
                                        <input type="range" id="modal-bg-volume" min="0" max="100" value="100">
                                        <span id="modal-bg-volume-value">100%</span>
                                    </div>
                                </div>
                                <div class="setting-item">
                                    <label><input type="checkbox" id="modal-pew-toggle" checked> Sound Effects</label>
                                    <div class="range-row">
                                        <input type="range" id="modal-pew-volume" min="0" max="100" value="100">
                                        <span id="modal-pew-volume-value">100%</span>
                                    </div>
                                </div>
                                <div class="setting-item">
                                    <label>Game Speed</label>
                                    <div class="range-row">
                                        <input type="range" id="modal-speed-slider" min="0.5" max="2" step="0.1" value="1">
                                        <span id="modal-speed-value">100%</span>
                                    </div>
                                </div>
                                <div class="setting-item">
                                    <label><input type="checkbox" id="modal-vk-toggle" checked> Virtual Keyboard</label>
                                </div>

        function buildVirtualKeyboard() {
            const layout = ["qwertyuiop", "asdfghjkl", "zxcvbnm"];
            const kbContainer = document.getElementById('virtual-keyboard');
            
            layout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                
                row.split('').forEach(char => {
                    const btn = document.createElement('div');
                    btn.className = 'kb-key';
                    btn.dataset.key = char;
                    btn.textContent = char;
                    
                    const triggerKey = (e) => {
                        e.preventDefault();
                        handleInput(char);
                    };

                    btn.addEventListener('pointerdown', triggerKey);
                    rowDiv.appendChild(btn);
                });
                kbContainer.appendChild(rowDiv);
            });
        }

        function handleInput(keyChar) {
            if (!isPlaying) return;
            
            const key = keyChar.toLowerCase();
            if (!key.match(/^[a-z]$/)) return;

            let hit = false;

            if (currentTarget) {
                const nextChar = currentTarget.word[currentTarget.typed];
                if (key === nextChar) {
                    currentTarget.typed++;
                    hit = true;
                    fireLaser(currentTarget.x, currentTarget.y);
                    triggerKnockback(currentTarget);
                    
                    if (currentTarget.typed === currentTarget.word.length) {
                        score += currentTarget.word.length * 10 + (streak * 5);
                        streak++;
                        createExplosion(currentTarget.x, currentTarget.y, '#00ffff');
                        if (currentTarget.hasHeart) {
                            health = Math.min(100, health + 15);
                            createExplosion(currentTarget.x, currentTarget.y, '#ff0055');
                            for (let j = 0; j < 10; j++) {
                                particles.push({
                                    x: currentTarget.x,
                                    y: currentTarget.y - 10,
                                    vx: (Math.random() - 0.5) * 4,
                                    vy: (Math.random() - 0.5) * 4,
                                    life: 1.0,
                                    color: '#ff0055'
                                });
                            }
                        }
                        enemies = enemies.filter(enemy => enemy !== currentTarget);
                        currentTarget = null;
                    }
                }
            } else {
                for (let enemy of enemies) {
                    if (enemy.word[0] === key) {
                        currentTarget = enemy;
                        currentTarget.typed = 1;
                        hit = true;
                        fireLaser(currentTarget.x, currentTarget.y);
                        triggerKnockback(currentTarget);
                        break;
                    }
                }
            }

            const keyEl = document.querySelector(`.kb-key[data-key="${key}"]`);
            if (keyEl) {
                keyEl.classList.add(hit ? 'active' : 'error');
                setTimeout(() => keyEl.classList.remove(hit ? 'active' : 'error'), 100);
            }

            if (!hit) {
                streak = 0;
                triggerEnemyCounterAttack();
                triggerMissEffect();
            }
            
            updateUI();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Enter' || e.code === 'Space') {
                e.preventDefault();
                if (!isPlaying && !document.getElementById('settings-modal').classList.contains('show')) {
                    document.getElementById('start-prompt').style.display = 'none';
                    startGame();
                    return;
                }
                if (isPlaying) {
                    isPlaying = false;
                    document.getElementById('settings-modal').classList.add('show');
                    document.getElementById('gameplay-buttons').style.display = 'flex';
                    document.getElementById('close-settings').style.display = 'flex';
                    document.getElementById('start-from-settings').style.display = 'none';
                    document.getElementById('settings-title').innerText = 'PAUSED';
                } else if (document.getElementById('settings-modal').classList.contains('show')) {
                    document.getElementById('settings-modal').classList.remove('show');
                    isPlaying = true;
                    const vkEnabled = document.getElementById('vk-toggle').checked;
                    document.getElementById('virtual-keyboard').style.display = vkEnabled ? 'flex' : 'none';
                    requestAnimationFrame(gameLoop);
                }
                return;
            }
            
            if (e.code === 'KeyJ' && !isPlaying && document.getElementById('game-over').style.display === 'flex') {
                startGame();
                return;
            }
            
            if (isPlaying) {
                handleInput(e.key);
            }
        });

        function triggerEnemyCounterAttack() {
            if (enemies.length === 0) return;
            
            const shooter = currentTarget || enemies[Math.floor(Math.random() * enemies.length)];
            
            enemyProjectiles.push({
                x: shooter.x,
                y: shooter.y,
                targetX: player.x,
                targetY: player.y,
                progress: 0,
                speed: 0.05 + (Math.random() * 0.05)
            });
        }

        function triggerMissEffect() {
            const overlay = document.getElementById('red-overlay');
            overlay.classList.remove('active');
            void overlay.offsetWidth;
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 300);
        }

        function triggerKnockback(enemy) {
            enemy.y = Math.max(enemy.y - 12, 30);
            enemy.knockbackTimer = 8;

            stars = [];

                    size: Math.random() * 2,
                    speed: Math.random() * 1.5 + 0.2

        function spawnEnemy(timestamp) {
            if (waveBreak) return;
            
            if (enemiesSpawned >= enemiesPerWave && enemies.length === 0) {
                currentWave++;
                enemiesSpawned = 0;
                enemiesPerWave = Math.min(5 + (currentWave - 1) * 3, 25);
                spawnRate = Math.max(2000 - (currentWave * 100), 800);
                waveBreak = true;
                setTimeout(() => {
                    waveBreak = false;
                    showWaveMessage();
                }, 2000);
                return;
            }
            
            if (timestamp - lastSpawn > spawnRate && enemiesSpawned < enemiesPerWave) {
                let word;
                const longWordChance = Math.min(0.15 + (currentWave * 0.05), 0.5);
                
                if (currentWave >= 2 && Math.random() < longWordChance && longWords.length > 0) {
                    word = longWords[Math.floor(Math.random() * longWords.length)];
                    showLongWordWarning();
                } else {
                    word = wordList[Math.floor(Math.random() * wordList.length)];
                }
                
                const startingLetter = word.charAt(0);
                const conflict = enemies.some(e => e.word.charAt(0) === startingLetter);
                
                if (!conflict) {
                    const margin = 60;
                    const maxX = canvas.width - margin;
                    const hasHeart = Math.random() < 0.12;
                    enemies.push({
                        word: word,
                        typed: 0,
                        x: Math.random() * (maxX - margin) + margin,
                        y: -30,
                        speed: baseSpeed + (Math.random() * 0.4),
                        hasHeart: hasHeart
                    });
                    enemiesSpawned++;
                    lastSpawn = timestamp;
                    
                    if (spawnRate > 600) spawnRate -= 10;
                    baseSpeed += 0.003;
                }
            }
        }
        
        function showLongWordWarning() {
            const warning = document.createElement('div');
            warning.id = 'long-word-warning';
            warning.innerText = '⚠️ WARNING\nincoming long word';

            document.getElementById('game-container').appendChild(warning);
            setTimeout(() => warning.remove(), 1200);
        }
        
        function showWaveMessage() {
            const waveMsg = document.createElement('div');
            waveMsg.id = 'wave-message';
            waveMsg.innerText = 'WAVE ' + currentWave;
            waveMsg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#00ffff;font-size:48px;font-weight:bold;text-shadow:0 0 20px #00ffff;z-index:200;pointer-events:none;';
            document.getElementById('game-container').appendChild(waveMsg);
            setTimeout(() => waveMsg.remove(), 1500);
        }

        function fireLaser(targetX, targetY) {
            lasers.push({
                x: player.x,
                y: player.y - 20,
                targetX: targetX,
                targetY: targetY,
                progress: 0
            });
            
            if (pewSoundEnabled) {
                const pewSound = document.getElementById('pew-sound');
                pewSound.volume = pewVolume;
                pewSound.currentTime = 0;
                pewSound.play().catch(() => {});
            }
        }

        function createExplosion(x, y, primaryColor) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: Math.random() > 0.5 ? primaryColor : '#ffffff'
                });
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            
            const hb = document.getElementById('health-bar');
            hb.style.width = Math.max(0, health) + '%';
            if (health <= 30) hb.style.backgroundColor = '#ff0055';
            else if (health <= 60) hb.style.backgroundColor = '#ffff00';
            else hb.style.backgroundColor = '#00ff00';
        }

        function gameOver(reason) {
            isPlaying = false;
            isDemoMode = false;
            document.getElementById('bg-music').pause();
            document.getElementById('spaceship-sprite').style.display = 'none';
            
            document.getElementById('screen-title').innerText = "SYSTEM FAILURE";
            document.getElementById('game-stats').style.display = 'flex';
            
            const rank = Math.max(1, 200 - Math.floor(score / 100));
            document.getElementById('final-rank').innerText = rank;
            document.getElementById('final-score').innerText = score;
            
            document.getElementById('instructions').innerHTML = 'Press [J] to continue';
            document.getElementById('start-btn').innerText = "RETRY MISSION";
            document.getElementById('start-btn').style.display = 'flex';
            
            document.getElementById('game-over').style.display = 'flex';
        }
        
        function stopGameLoop() {
            isPlaying = false;
        }

        document.getElementById('submit-score-btn')?.addEventListener('click', function() {
            const playerName = document.getElementById('player-name')?.value || 'Anonymous';
            const finalScore = score;
            
            this.innerText = 'SUCCEED!';
            this.style.background = 'linear-gradient(135deg, #00ff00, #00cc00)';
            this.style.boxShadow = '0 0 25px rgba(0,255,0,0.5)';
            
            setTimeout(() => {
                alert(`Score succeeded!\n\nName: ${playerName}\nScore: ${finalScore}\n\n(Webhook/POST not implemented yet)`);
            }, 100);
        });

function drawPlayer() {
            const sprite = document.getElementById('spaceship-sprite');
            
            let rotation = 0;
            if (currentTarget) {
                const dx = currentTarget.x - player.x;
                const dy = currentTarget.y - player.y;
                rotation = Math.atan2(dx, dy) * 0.15;
                rotation = Math.max(-0.3, Math.min(0.3, rotation));
            }
            
            // Center sprite on player.y position
            sprite.style.left = (player.x - 21) + 'px';
            sprite.style.top = (player.y - 42) + 'px';
            sprite.style.transform = `rotate(${rotation}rad)`;
        }

        function gameLoop(timestamp) {
            if (!isPlaying) return;

            ctx.save();
            
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * 15;
                const dy = (Math.random() - 0.5) * 15;
                ctx.translate(dx, dy);
                screenShake--;
            }

            ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);

            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.globalAlpha = star.size / 2;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1.0;

            spawnEnemy(timestamp);

            const fontSize = Math.max(12, Math.min(16, canvas.width / 28));
            ctx.textAlign = 'center';
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                
                if (enemy.knockbackTimer > 0) {
                    enemy.knockbackTimer--;
                    enemy.y += enemy.speed * 0.3;
                } else {
                    enemy.y += enemy.speed;
                }

                if (enemy.y > canvas.height - 40) {
                    gameOver("An invader breached your defenses!");
                    stopGameLoop();
                    return;
                }

                const scale = 1;
                const targetY = enemy.y - 17;
                
                if (!enemy.hasHeart) {
                    ctx.save();
                    ctx.translate(enemy.x - 8.5 * scale, targetY - 8.5 * scale);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill(targetPath);
                    ctx.restore();

                    if (enemy === currentTarget) {
                        ctx.save();
                        ctx.translate(enemy.x - 8.5 * scale, targetY - 8.5 * scale);
                        ctx.scale(scale, scale);
                        ctx.strokeStyle = '#ff00ff';
                        ctx.lineWidth = 3 / scale;
                        ctx.stroke(targetPath);
                        ctx.restore();
                    }
                } else {
                    ctx.save();
                    ctx.translate(enemy.x - 10, enemy.y - 22);
                    ctx.scale(0.45, 0.45);
                    ctx.fillStyle = '#ff0055';
                    ctx.fill(heartPath);
                    ctx.restore();
                }

                ctx.font = `bold ${fontSize}px "Courier New"`;
                const typedPart = enemy.word.substring(0, enemy.typed);
                const untypedPart = enemy.word.substring(enemy.typed);
                
                const typedWidth = ctx.measureText(typedPart).width;
                const untypedWidth = ctx.measureText(untypedPart).width;
                const totalWidth = typedWidth + untypedWidth;
                const startX = enemy.x - (totalWidth / 2);

                ctx.fillStyle = '#00ff00';
                ctx.textAlign = 'left';
                ctx.fillText(typedPart, startX, enemy.y + 5);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillText(untypedPart, startX + typedWidth, enemy.y + 5);
            }

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.progress += 0.25; 
                
                ctx.beginPath();
                const startX = l.x + (l.targetX - l.x) * Math.max(0, l.progress - 0.2);
                const startY = l.y + (l.targetY - l.y) * Math.max(0, l.progress - 0.2);
                const endX = l.x + (l.targetX - l.x) * l.progress;
                const endY = l.y + (l.targetY - l.y) * l.progress;
                
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                if (l.progress >= 1) lasers.splice(i, 1);
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let ep = enemyProjectiles[i];
                ep.progress += ep.speed; 
                
                const currentX = ep.x + (ep.targetX - ep.x) * ep.progress;
                const currentY = ep.y + (ep.targetY - ep.y) * ep.progress;

                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(currentX, currentY, 5, 0, Math.PI * 2);
                ctx.fill();

                if (ep.progress >= 1) {
                    health -= 15;
                    screenShake = 15;
                    createExplosion(player.x, player.y, '#ff0055');
                    enemyProjectiles.splice(i, 1);
                    updateUI();
                    
                    if (health <= 0) {
                        gameOver("Your ship was destroyed by counter-fire!");
                        ctx.restore();
                        return;
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }

            updatePlayerPosition();
            drawPlayer();
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        buildVirtualKeyboard();
        setupTopLeftIcons();
        resizeCanvas();
        
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('virtual-keyboard').style.display = 'none';
        
        initStars();
        const sprite = document.getElementById('spaceship-sprite');
        sprite.style.display = 'block';
        
        function renderStartScreen() {
            if (isPlaying) return;
            if (!isDemoMode) {
                if (enemies.length === 0 && lasers.length === 0 && particles.length === 0) return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.globalAlpha = star.size / 2;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1.0;
            
            if (isDemoMode) {
                spawnDemoEnemy();
                if (enemies.length > 0) {
                    const target = currentTarget || enemies[0];
                    if (target) {
                        currentTarget = target;
                        const letter = target.word[target.typed];
                        handleInput(letter);
                    }
                }
            }
            
            drawPlayer();
            drawEnemies();
            drawLasers();
            drawParticles();
            
            requestAnimationFrame(renderStartScreen);
        }
        
        let lastDemoSpawn = 0;
        function spawnDemoEnemy() {
            const now = Date.now();
            if (now - lastDemoSpawn > 1200) {
                const word = wordList[Math.floor(Math.random() * wordList.length)];
                const margin = 60;
                enemies.push({
                    word: word,
                    typed: 0,
                    x: Math.random() * (canvas.width - margin * 2) + margin,
                    y: -30,
                    speed: 0.5,
                    hasHeart: false
                });
                lastDemoSpawn = now;
            }
        }
        
        function drawEnemies() {
            const fontSize = Math.max(12, Math.min(16, canvas.width / 28));
            ctx.textAlign = 'center';
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.y += enemy.speed;
                
                if (enemy.y > canvas.height - 40) {
                    if (!isDemoMode) {
                        return gameOver("An invader breached your defenses!");
                    }
                    enemies.splice(i, 1);
                    continue;
                }
                
                const targetY = enemy.y - 17;
                const scale = 1;
                
                ctx.save();
                ctx.translate(enemy.x - 8.5 * scale, targetY - 8.5 * scale);
                ctx.scale(scale, scale);
                ctx.fillStyle = '#ffffff';
                ctx.fill(targetPath);
                ctx.restore();
                
                ctx.font = `bold ${fontSize}px "Courier New"`;
                const typedPart = enemy.word.substring(0, enemy.typed);
                const untypedPart = enemy.word.substring(enemy.typed);
                const typedWidth = ctx.measureText(typedPart).width;
                const totalWidth = typedWidth + ctx.measureText(untypedPart).width;
                const startX = enemy.x - totalWidth / 2;
                
                ctx.fillStyle = '#00ff00';
                ctx.textAlign = 'left';
                ctx.fillText(typedPart, startX, enemy.y + 5);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(untypedPart, startX + typedWidth, enemy.y + 5);
            }
        }
        
        function drawLasers() {
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].progress += 0.25;
                if (lasers[i].progress >= 1) {
                    lasers.splice(i, 1);
                }
            }
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].life -= 0.05;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        renderStartScreen();
        
        document.getElementById('bgmusic-toggle').checked = true;
        document.getElementById('pew-toggle').checked = true;
        document.getElementById('modal-bgmusic-toggle').checked = true;
        document.getElementById('modal-pew-toggle').checked = true;
        document.getElementById('sound-on-icon').style.display = 'flex';
        document.getElementById('sound-off-icon').style.display = 'none';

        document.getElementById('game-container').addEventListener('click', function() {
            if (!isPlaying) {
                isDemoMode = false;
                document.getElementById('start-prompt').style.display = 'none';
                startGame();
            }
        });

    </script>
</body>
</html>
